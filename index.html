<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>야외 방탈출 미션</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인 화면 -->
  <div class="container" id="loginBox">

    <h1>야외 방탈출 미션</h1>

    <p>이름과 세례명을 입력하세요</p>

    <input type="text" id="name" placeholder="이름" />

    <input type="text" id="baptismName" placeholder="세례명" />

    <input type="text" id="team" placeholder="팀 이름" />

    <button id="enterBtn">
      시작하기
    </button>

  </div>

  <!-- 메인 화면 -->
  <div class="container" id="mainBox" style="display:none;">

    <h1>미션 입장 완료</h1>

    <h2 id="welcomeText"></h2>

    <h2>1번 미션: 퍼즐 맞추기</h2>

<div id="puzzleBoard"></div>

<p id="puzzleMessage"></p>

    <button id="resetBtn">
      초기화
    </button>

  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
